name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall src
      - name: Secret scan
        run: |
          if grep -RIE "sk-[A-Za-z0-9]{20,}" --exclude-dir=.git --exclude-dir=.venv .; then
            echo "Potential hardcoded API key found"
            exit 1
          fi
